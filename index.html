<style>
  :root{--bg:#f4f6f9;--card:#ffffff;--accent:#ff6b00;--accent2:#e85d04;--text:#1b1f27;--muted:#6b7280;--green:#16a34a;--line:#e7eaf0;--shadow:0 2px 10px rgba(20,30,55,.06);--shadow-hover:0 10px 28px rgba(20,30,55,.13);}
  *{box-sizing:border-box;margin:0;padding:0;}

  .wrap{max-width:720px;margin:0 auto;padding:0 16px 64px;}
  header{text-align:center;padding:30px 22px 26px;margin:18px 0 8px;border-radius:22px;

  .logo span{color:var(--accent);}
  .tag{color:#8a6a52;font-size:15px;margin-top:6px;font-weight:600;}
  .socials{display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
  .socials a{background:#fff;color:var(--text);text-decoration:none;font-weight:700;font-size:13px;padding:9px 16px;border-radius:999px;border:1px solid var(--line);box-shadow:var(--shadow);transition:.15s;}
  .socials a:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
  .cats{position:sticky;top:0;z-index:10;background:rgba(244,246,249,.92);backdrop-filter:blur(10px);display:flex;gap:8px;overflow-x:auto;padding:12px 2px;margin:14px 0 16px;-webkit-overflow-scrolling:touch;}
  .cats::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;background:#fff;border:1px solid var(--line);color:var(--text);font-weight:700;font-size:14px;padding:9px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s;box-shadow:var(--shadow);}
  .chip:hover{border-color:var(--accent);}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(255,107,0,.32);}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{background:var(--card);border-radius:18px;overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column;transition:.18s;box-shadow:var(--shadow);}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);border-color:#ffd7b8;}
  .imgwrap{position:relative;background:#fff;aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:12px;border-bottom:1px solid #f1f3f7;}
  .imgwrap img{max-width:100%;max-height:100%;object-fit:contain;}
  .disc{position:absolute;top:9px;right:9px;background:var(--accent);color:#fff;font-weight:900;font-size:13px;padding:4px 9px;border-radius:9px;box-shadow:0 2px 8px rgba(255,107,0,.35);}
  .store{position:absolute;top:9px;left:9px;background:#fff;color:#444;font-weight:700;font-size:11px;padding:4px 8px;border-radius:7px;border:1px solid var(--line);box-shadow:var(--shadow);}
  .body{padding:13px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .title{font-size:13px;line-height:1.35;font-weight:600;color:#2b303a;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .prices{margin-top:auto;}
  .old{color:var(--muted);text-decoration:line-through;font-size:13px;}
  .new{color:var(--accent2);font-weight:900;font-size:22px;line-height:1;}
  .btn{display:block;text-align:center;background:var(--accent);color:#fff;text-decoration:none;font-weight:800;font-size:14px;padding:11px;border-radius:11px;margin-top:4px;transition:.15s;}
  .btn:hover{background:#ff7d1f;box-shadow:0 6px 16px rgba(255,107,0,.3);}
  .topbadge{display:inline-block;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-weight:800;font-size:11px;padding:3px 8px;border-radius:7px;align-self:flex-start;margin-bottom:2px;}
  .empty{text-align:center;color:var(--muted);padding:40px;}
  footer{text-align:center;color:var(--muted);font-size:13px;margin-top:40px;padding-top:22px;border-top:1px solid var(--line);}
  footer a{color:var(--accent);text-decoration:none;}
  .count{color:var(--muted);font-size:13px;text-align:center;margin-bottom:10px;font-weight:600;}
</style>

  const CATS  = [{"id":"tech","label":"Tecnologia","emoji":"💻"},{"id":"home","label":"Casa","emoji":"🏠"},{"id":"beauty","label":"Beleza","emoji":"💄"},{"id":"fashion","label":"Moda","emoji":"👕"},{"id":"baby","label":"Bebé & Criança","emoji":"🧸"},{"id":"other","label":"Outras Ofertas","emoji":"🛍️"}];
  const STORE = {"amazon":"Amazon","worten":"Worten","aliexpress":"AliExpress","leroymerlin":"Leroy Merlin","pccomponentes":"PC Componentes"};
  let active = 'all';

  const grid = document.getElementById('grid');
  const catsEl = document.getElementById('cats');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');

  function chip(id, label){ const b=document.createElement('button'); b.className='chip'+(id===active?' active':''); b.textContent=label; b.onclick=()=>{active=id;render();}; return b; }
  function buildChips(){
    catsEl.innerHTML='';
    catsEl.appendChild(chip('all','✨ Todas'));
    CATS.forEach(c=>catsEl.appendChild(chip(c.id, c.emoji+' '+c.label)));
  }
  function card(d){
    const old = d.original_price ? '<span class="old">'+fmt(d.original_price)+'</span> ' : '';
    const store = STORE[d.store] || (d.store? d.store : '');
    return '<div class="card"><div class="imgwrap">'
      + (store?'<span class="store">'+store+'</span>':'')
      + '<span class="disc">-'+d.discount+'%</span>'
      + '<img loading="lazy" src="'+d.image+'" alt=""></div>'
      + '<div class="body">'
      + (d.discount>=50?'<span class="topbadge">🔥 TOP DESCONTO</span>':'')
      + '<div class="title">'+escapeHtml(d.title)+'</div>'
      + '<div class="prices">'+old+'<span class="new">'+fmt(d.price)+'</span></div>'
      + '<a class="btn" href="'+d.url+'" target="_blank" rel="noopener sponsored">Ver oferta →</a></div></div>';
  }
  function render(){
    buildChips();
    const list = active==='all'? DEALS : DEALS.filter(d=>d.category===active);
    grid.innerHTML = list.map(card).join('');
    countEl.textContent = list.length+' ofertas';
    emptyEl.style.display = list.length? 'none':'block';
  }
  function fmt(v){return Number(v).toFixed(2).replace('.',',')+'€';}
  function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  render();
</script>
