<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Promoções — As melhores ofertas do dia</title>
<meta name="description" content="As melhores ofertas e descontos em Amazon, Worten, AliExpress e mais. Atualizado diariamente."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4f6f9;--card:#ffffff;--accent:#ff6b00;--accent2:#e85d04;--text:#1b1f27;--muted:#6b7280;--green:#16a34a;--line:#e7eaf0;--shadow:0 2px 10px rgba(20,30,55,.06);--shadow-hover:0 10px 28px rgba(20,30,55,.13);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Outfit,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:720px;margin:0 auto;padding:0 16px 64px;}
  header{text-align:center;padding:30px 22px 26px;margin:18px 0 8px;border-radius:22px;
         background:linear-gradient(135deg,#fff6ef 0%,#ffece0 100%);border:1px solid #ffe2cf;}
  .logo{font-size:34px;font-weight:900;letter-spacing:-1.2px;}
  .logo span{color:var(--accent);}
  .tag{color:#8a6a52;font-size:15px;margin-top:6px;font-weight:600;}
  .socials{display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
  .socials a{background:#fff;color:var(--text);text-decoration:none;font-weight:700;font-size:13px;padding:9px 16px;border-radius:999px;border:1px solid var(--line);box-shadow:var(--shadow);transition:.15s;}
  .socials a:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
  .cats{position:sticky;top:0;z-index:10;background:rgba(244,246,249,.92);backdrop-filter:blur(10px);display:flex;gap:8px;overflow-x:auto;padding:12px 2px;margin:14px 0 16px;-webkit-overflow-scrolling:touch;}
  .cats::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;background:#fff;border:1px solid var(--line);color:var(--text);font-weight:700;font-size:14px;padding:9px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s;box-shadow:var(--shadow);}
  .chip:hover{border-color:var(--accent);}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(255,107,0,.32);}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{background:var(--card);border-radius:18px;overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column;transition:.18s;box-shadow:var(--shadow);}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);border-color:#ffd7b8;}
  .imgwrap{position:relative;background:#fff;aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:12px;border-bottom:1px solid #f1f3f7;}
  .imgwrap img{max-width:100%;max-height:100%;object-fit:contain;}
  .disc{position:absolute;top:9px;right:9px;background:var(--accent);color:#fff;font-weight:900;font-size:13px;padding:4px 9px;border-radius:9px;box-shadow:0 2px 8px rgba(255,107,0,.35);}
  .store{position:absolute;top:9px;left:9px;background:#fff;color:#444;font-weight:700;font-size:11px;padding:4px 8px;border-radius:7px;border:1px solid var(--line);box-shadow:var(--shadow);}
  .body{padding:13px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .title{font-size:13px;line-height:1.35;font-weight:600;color:#2b303a;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .prices{margin-top:auto;}
  .old{color:var(--muted);text-decoration:line-through;font-size:13px;}
  .new{color:var(--accent2);font-weight:900;font-size:22px;line-height:1;}
  .btn{display:block;text-align:center;background:var(--accent);color:#fff;text-decoration:none;font-weight:800;font-size:14px;padding:11px;border-radius:11px;margin-top:4px;transition:.15s;}
  .btn:hover{background:#ff7d1f;box-shadow:0 6px 16px rgba(255,107,0,.3);}
  .empty{text-align:center;color:var(--muted);padding:40px;}
  footer{text-align:center;color:var(--muted);font-size:13px;margin-top:40px;padding-top:22px;border-top:1px solid var(--line);}
  footer a{color:var(--accent);text-decoration:none;}
  .count{color:var(--muted);font-size:13px;text-align:center;margin-bottom:10px;font-weight:600;}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">Promo<span>ções</span></div>
      <div class="tag">As melhores ofertas, todos os dias 🔥</div>
      <div class="socials">
        <a href="https://t.me/+2GxPnUedDnU4Yzg0" target="_blank" rel="noopener">📢 Telegram</a>
        <a href="https://www.instagram.com/descontospontuais/" target="_blank" rel="noopener">📸 Instagram</a>
        <a href="https://www.tiktok.com/@bestd3al" target="_blank" rel="noopener">🎵 TikTok</a>
        <a href="https://www.facebook.com/people/Super-Descontos/100094634377628/" target="_blank" rel="noopener">👍 Facebook</a>
      </div>
    </header>

    <div class="cats" id="cats"></div>
    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">Sem ofertas nesta categoria.</div>

    <footer>
      <p>© 2026 Promoções · ofertas com links de afiliado<br>
      <a href="./privacy.html">Política de Privacidade</a> · <a href="./terms.html">Termos</a></p>
    </footer>
  </div>

<script>
  const DEALS = [{"title":"Smart Ball - Soccerbot, Treinador pessoal de futebol indoor, bot com sensores para seguir a bola, manobrando para testar as suas habilidades, ecrã LCD para a pontuação, Famosa (MR100000)","image":"https://m.media-amazon.com/images/I/71jqCKu8gjL._SL500_.jpg","url":"https://www.amazon.es/-/pt/dp/B0D54BMJKR/ref=sr_1_3?tag=descontoseopo-21","price":39,"original_price":59.95,"discount":35,"store":"amazon","category":"other"},{"title":"MSI GeForce RTX 5060 Ti 8G Ventus 2X OC Plus Placa de vídeo, RTX 5060 Ti, 8 GB GDDR7 (28 Gbps/128 bits), PCIe 5.0 - Design térmico de Dupla Ventilação (2 x Ventilador STORMFORCE) - HDMI 2.1b","image":"https://m.media-amazon.com/images/I/71yZ+zHNPxL._SL500_.jpg","url":"https://www.amazon.es/dp/B0F32ND24S?tag=descontoseopo-21","price":283,"original_price":469.9,"discount":40,"store":"amazon","category":"tech"},{"title":"Philips Lumea série 8000, dispositivo IPL para depilação, alternativa à depilação a laser, tecnologia SenseIQ, 4 acessórios para o corpo, lápis recortador compacto acetinado, BRI949/00","image":"https://m.media-amazon.com/images/I/712jWwa7kaL._SL500_.jpg","url":"https://www.amazon.es/dp/B07HX2KMXK?tag=descontoseopo-21","price":279,"original_price":579.99,"discount":52,"store":"amazon","category":"beauty"},{"title":"BISSELL 15585 SpotClean Pet Pro Portátil, Preto/Verde, 750 W","image":"https://m.media-amazon.com/images/I/6105Hm79qgL._SL500_.jpg","url":"https://www.amazon.es/dp/B084PSXMQM?tag=descontoseopo-21","price":149,"original_price":259.99,"discount":43,"store":"amazon","category":"tech"},{"title":"Dodot Toalhetes Pure Aqua para bebé, 1152 toalhetes (24 pacotes de 48 unidades), ajudam a restaurar o PH natural da pele, 99% água, sem plástico","image":"https://m.media-amazon.com/images/I/81fYd4UBJ+L._SL500_.jpg","url":"https://www.amazon.es/dp/B0DP7K72L5?tag=descontoseopo-21","price":35,"original_price":59.99,"discount":42,"store":"amazon","category":"other"},{"title":"VACTechPro Aspirador sem Cabo, 35kPa Aspirador de Mão, 6 em 1 Sem Fios com 35 minutos de autonomia e bateria removível, Aspirador Vassoura Ideal para Pelo de Animais de Estimação/Tapete/Chão Duro","image":"https://m.media-amazon.com/images/I/61mMhLs15XL._SL500_.jpg","url":"https://www.amazon.es/dp/B0D1KCLVPX?tag=descontoseopo-21","price":79,"original_price":159,"discount":50,"store":"amazon","category":"home"},{"title":"Quiksilver - Everyday Volley 15\" Jam/Volley para homem","image":"https://m.media-amazon.com/images/I/81dlPIcgLrL._SL500_.jpg","url":"https://www.amazon.es/dp/B08284T9QV?tag=descontoseopo-21","price":13,"original_price":30,"discount":57,"store":"amazon","category":"other"},{"title":"Dodot Toalhetes Pure Aqua para bebé, 864 toalhetes (18 pacotes de 48 unidades), ajudam a restaurar o PH natural da pele, 99% água, sem plástico","image":"https://m.media-amazon.com/images/I/819tfUFxzEL._SL500_.jpg","url":"https://www.amazon.es/dp/B09GPJHCQL?tag=descontoseopo-21","price":29,"original_price":48.99,"discount":41,"store":"amazon","category":"other"}];
  const CATS  = [{"id":"tech","label":"Tecnologia","emoji":"💻"},{"id":"home","label":"Casa","emoji":"🏠"},{"id":"beauty","label":"Beleza","emoji":"💄"},{"id":"other","label":"Outras Ofertas","emoji":"🛍️"}];
  const STORE = {"amazon":"Amazon","worten":"Worten","aliexpress":"AliExpress","leroymerlin":"Leroy Merlin","pccomponentes":"PC Componentes"};
  let active = 'all';

  const grid = document.getElementById('grid');
  const catsEl = document.getElementById('cats');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');

  function chip(id, label){ const b=document.createElement('button'); b.className='chip'+(id===active?' active':''); b.textContent=label; b.onclick=()=>{active=id;render();}; return b; }
  function buildChips(){
    catsEl.innerHTML='';
    catsEl.appendChild(chip('all','✨ Todas'));
    CATS.forEach(c=>catsEl.appendChild(chip(c.id, c.emoji+' '+c.label)));
  }
  function card(d){
    const old = d.original_price ? '<span class="old">'+fmt(d.original_price)+'</span> ' : '';
    const store = STORE[d.store] || (d.store? d.store : '');
    return '<div class="card"><div class="imgwrap">'
      + (store?'<span class="store">'+store+'</span>':'')
      + '<span class="disc">-'+d.discount+'%</span>'
      + '<img loading="lazy" src="'+d.image+'" alt=""></div>'
      + '<div class="body"><div class="title">'+escapeHtml(d.title)+'</div>'
      + '<div class="prices">'+old+'<span class="new">'+fmt(d.price)+'</span></div>'
      + '<a class="btn" href="'+d.url+'" target="_blank" rel="noopener sponsored">Ver oferta →</a></div></div>';
  }
  function render(){
    buildChips();
    const list = active==='all'? DEALS : DEALS.filter(d=>d.category===active);
    grid.innerHTML = list.map(card).join('');
    countEl.textContent = list.length+' ofertas';
    emptyEl.style.display = list.length? 'none':'block';
  }
  function fmt(v){return Number(v).toFixed(2).replace('.',',')+'€';}
  function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  render();
</script>
</body>
</html>
